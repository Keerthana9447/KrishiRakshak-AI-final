services:
  - type: web
    name: krishirakshak-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/download_model.py
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 8000

  - type: static
    name: krishirakshak-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
